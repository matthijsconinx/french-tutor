<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2;
    --bg-card: #FFFFFF;
    --bg-card-alt: #F3EFE8;
    --fg: #1A1A1A;
    --fg-dim: #6B6560;
    --fg-muted: #A39E98;
    --accent: #C84B31;
    --accent-soft: #F2DDD6;
    --accent-glow: rgba(200, 75, 49, 0.15);
    --green: #2D8A56;
    --green-soft: #DFF0E5;
    --green-border: #C5E1CE;
    --blue: #3B6DB5;
    --blue-soft: #E0EAF5;
    --blue-border: #B8CCE5;
    --border: #E8E3DC;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    --shadow-lg: 0 4px 24px rgba(0,0,0,0.06);

    --ease: cubic-bezier(0.22, 1, 0.36, 1);
    --error-bg: #FFF0EE;
    --error-border: #F0C5BF;
    --error-fg: #8B2D1A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 16px; -webkit-text-size-adjust: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--fg);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px; z-index: 9999;
  }

  #root { min-height: 100dvh; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes spin { to { transform:rotate(360deg); } }
  @keyframes dotBounce {
    0%,80%,100% { transform:translateY(0); }
    40% { transform:translateY(-4px); }
  }

  .fade-up { animation: fadeUp 0.5s var(--ease) both; }
  .fade-up-1 { animation-delay: 0.05s; }
  .fade-up-2 { animation-delay: 0.1s; }
  .fade-up-3 { animation-delay: 0.15s; }
  .slide-in { animation: slideIn 0.35s var(--ease) both; }

  .scene-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .scene-btn {
    padding: 14px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg-card);
    cursor: pointer; text-align: left; font-family: var(--font-body);
    transition: all 0.15s var(--ease);
  }
  .scene-btn:hover, .scene-btn:active { border-color: var(--accent); background: var(--accent-soft); }
  .scene-btn-active { border-color: var(--accent); background: var(--accent-soft); box-shadow: 0 0 0 2px var(--accent-glow); }

  .chip {

    border-radius: 20px; border: 1px solid var(--border);
    background: var(--bg-card); font-size: 13.5px; color: var(--fg-dim);
    cursor: pointer; font-family: var(--font-body); font-style: italic;
    transition: all 0.15s var(--ease);
  }
  .chip:hover, .chip:active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .text-input-row { display: flex; gap: 8px; align-items: center; padding: 0 16px; margin-bottom: 6px; }
  .text-input-row input {
    flex: 1; padding: 10px 14px; font-size: 15px;
    border: 1px solid var(--border); border-radius: 24px;
    background: var(--bg-card); outline: none;
    font-family: var(--font-body); font-style: italic;
    color: var(--fg); transition: border-color 0.2s;
  }
  .text-input-row input:focus { border-color: var(--accent); }
  .text-input-row input::placeholder { color: var(--fg-muted); }
  .text-input-row button {
    width: 38px; height: 38px; border-radius: 50%;
    border: none; background: var(--accent); color: #fff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  .text-input-row button:disabled { opacity: 0.4; cursor: not-allowed; }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;

    padding: 20px 18px 28px; overflow-y: auto;

  .playing-indicator {
    display: inline-flex; gap: 2px; align-items: flex-end;

  }
  .playing-indicator span {
    width: 3px; background: var(--accent); border-radius: 1px;

  }

  .playing-indicator span:nth-child(3) { height: 6px; animation-delay: 0.3s; }
</style>

/* ════════════════════════════════════════════
   SYSTEM PROMPT
   ════════════════════════════════════════════ */

const SYSTEM_PROMPT = (cefrLevel) => `
You are a friendly French conversation partner and light tutor named Parle.
- Goal: reply to continue the conversation naturally.
- You receive: CEFR level, scene info, session summary, recent turns. Use them for continuity.
- French reply rules (non-negotiable):
  - Voice-first: 1–3 sentences, friend-like, easy, confidence-building.
  - Stay consistent with the scene lightly (don't force it).
  - ~70% of the time ask ONE natural follow-up question in French.
  - Sometimes add a tiny personal detail ("Moi aussi…", "Ça me fait penser à…").
- Corrections:
  - Output corrections ONLY in notes_en, only if the user's French has errors that would block smoothness/meaning for a native speaker. Skip nitpicks.
  - Each note MUST include the corrected French phrase so the learner sees the fix. Format: explain the error in English, then show the correction. Example: "Use 'la table' not 'le table' — table is feminine in French."
  - Never correct the user inside the French reply.
- CEFR target: ${cefrLevel} — adapt vocabulary, complexity, and nuance.

Return valid JSON only (no markdown fences) with exactly these fields:
- tutor_text_fr (string): your French reply
- notes_en (array of strings): 0-3 correction notes in English, each including the corrected French
- session_summary (string): <=30 words, English, ultra-dense facts only (who/where/job/hobbies/preferences/plans). If no new facts, return previous summary unchanged.
`.trim();

/* ════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════ */

function pickMime() {
  for (const t of ["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/mpeg"]) {
    if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
  }
  return "";
}

function filenameForMime(mime) {
  if (mime.includes("mp4")) return "audio.mp4";
  if (mime.includes("mpeg")) return "audio.mp3";
  if (mime.includes("wav")) return "audio.wav";
  if (mime.includes("ogg")) return "audio.ogg";
  return "audio.webm";
}

function friendlyApiError(status, body) {
  if (status === 401) return "Invalid API key. Please check your key and try again.";
  if (status === 429) return "Rate limit exceeded — wait a moment and try again.";
  if (status === 402 || (body && body.includes("insufficient_quota")))
    return "Your OpenAI account has no credits. Add billing at platform.openai.com.";
  if (status >= 500) return "OpenAI servers are having issues. Try again shortly.";
  return null;
}

/* ════════════════════════════════════════════
   COMPONENTS
   ════════════════════════════════════════════ */

function ApiKeyScreen({ onSubmit }) {
  const [key, setKey] = useState("");
  const [testing, setTesting] = useState(false);
  const [err, setErr] = useState(null);
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);

  const handleSubmit = async (e) => {
    e?.preventDefault();
    const trimmed = key.trim();
    if (!trimmed) return;
    setTesting(true); setErr(null);
    try {
      const resp = await fetch("https://api.openai.com/v1/models", {
        headers: { "Authorization": `Bearer ${trimmed}` }
      });
      if (!resp.ok) {
        const body = await resp.text();
        throw new Error(friendlyApiError(resp.status, body) || "Could not validate key (error " + resp.status + ")");
      }
      onSubmit(trimmed);
    } catch (e) {
      setErr(e.message || "Could not validate key.");
    } finally { setTesting(false); }
  };

  return (
    <div style={{ minHeight:"100dvh", display:"flex", alignItems:"center", justifyContent:"center", padding:24, background:"var(--bg)" }}>
      <div className="fade-up" style={{ maxWidth:420, width:"100%", textAlign:"center" }}>
        <div style={{ fontSize:48, marginBottom:8 }}>🇫🇷</div>
        <h1 style={{ fontFamily:"var(--font-display)", fontSize:"clamp(32px,8vw,44px)", fontWeight:400, letterSpacing:"-0.02em", marginBottom:6 }}>Parle</h1>
        <p style={{ fontFamily:"var(--font-display)", fontStyle:"italic", color:"var(--fg-dim)", fontSize:17, marginBottom:32 }}>Your French pocket tutor</p>
        <div className="fade-up fade-up-2" style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:"var(--radius)", padding:24, boxShadow:"var(--shadow)", textAlign:"left" }}>
          <label style={{ display:"block", fontSize:13, fontWeight:500, color:"var(--fg-dim)", marginBottom:8, letterSpacing:"0.02em", textTransform:"uppercase" }}>OpenAI API Key</label>
          <p style={{ fontSize:13.5, color:"var(--fg-dim)", marginBottom:16, lineHeight:1.5 }}>
            Your key stays in this browser only. It's sent directly to OpenAI — never to any other server.
          </p>
          <form onSubmit={handleSubmit}>
            <input ref={inputRef} type="password" placeholder="sk-..." value={key}
              onChange={e => setKey(e.target.value)}
              style={{ width:"100%", padding:"12px 14px", fontSize:15, border:"1px solid var(--border)", borderRadius:"var(--radius-sm)", background:"var(--bg)", outline:"none", fontFamily:"var(--font-body)", transition:"border-color 0.2s" }}
              onFocus={e => e.target.style.borderColor = "var(--accent)"} onBlur={e => e.target.style.borderColor = "var(--border)"} />
            {err && <div style={{ marginTop:10, padding:"8px 12px", background:"var(--error-bg)", border:"1px solid var(--error-border)", borderRadius:"var(--radius-sm)", fontSize:13.5, color:"var(--error-fg)", lineHeight:1.4 }}>{err}</div>}
            <button type="submit" disabled={!key.trim() || testing}
              style={{ width:"100%", marginTop:12, padding:13, background:key.trim()&&!testing?"var(--accent)":"var(--border)", color:key.trim()&&!testing?"#fff":"var(--fg-muted)", border:"none", borderRadius:"var(--radius-sm)", fontSize:15, fontWeight:600, cursor:key.trim()&&!testing?"pointer":"not-allowed", fontFamily:"var(--font-body)", transition:"all 0.2s" }}>
              {testing ? "Validating…" : "Commencer"}
            </button>
          </form>
        </div>
        <p className="fade-up fade-up-3" style={{ marginTop:16, fontSize:12.5, color:"var(--fg-muted)", lineHeight:1.5 }}>
          Get a key at <span style={{textDecoration:"underline"}}>platform.openai.com</span> → API Keys
        </p>
      </div>
    </div>
  );
}

      <div style={{ padding:"12px 16px", background:isUser?"var(--fg)":"var(--bg-card)", color:isUser?"#fff":"var(--fg)", borderRadius:isUser?"18px 18px 4px 18px":"18px 18px 18px 4px", fontSize:15.5, lineHeight:1.55, boxShadow:isUser?"none":"var(--shadow)", border:isUser?"none":"1px solid var(--border)", fontStyle:isUser?"italic":"normal", wordBreak:"break-word" }}>

}

/* ════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════ */

function App() {
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("parle_api_key")||""; } catch { return ""; } });
  const [cefrLevel, setCefrLevel] = useState("A2");
  const [scene, setScene] = useState(() => SCENES[Math.floor(Math.random() * SCENES.length)]);
  const [sessionSummary, setSessionSummary] = useState("");
  const [history, setHistory] = useState([]);
  const [recording, setRecording] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [error, setError] = useState(null);
  const [showScenePicker, setShowScenePicker] = useState(false);
  const [showSummary, setShowSummary] = useState(false);
  const [textInput, setTextInput] = useState("");
  const [playingIdx, setPlayingIdx] = useState(null);

  const mediaRecorderRef = useRef(null);
  const chunksRef = useRef([]);
  const streamRef = useRef(null);
  const scrollRef = useRef(null);
  const pressedRef = useRef(false);
  const textInputRef = useRef(null);
  const currentAudioRef = useRef(null);
  const hasInit = useRef(false);

  /* ── Audio ── */
  function stopAudio() {
    try { currentAudioRef.current?.pause(); currentAudioRef.current = null; } catch {}
    try { window.speechSynthesis?.cancel?.(); } catch {}
    setPlayingIdx(null);
  }

  function speakOpenAI(text, key, speed) {
    if (!key || !text) return;
    stopAudio();
    fetch("https://api.openai.com/v1/audio/speech", {
      method: "POST",
      headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
      body: JSON.stringify({ model: "tts-1", voice: "nova", input: text, speed: speed || 1.0 })
    }).then(resp => {
      if (!resp.ok) throw new Error("TTS failed");
      return resp.blob();
    }).then(blob => {
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      currentAudioRef.current = audio;
      audio.onended = () => { setPlayingIdx(null); URL.revokeObjectURL(url); };
      audio.onerror = () => { setPlayingIdx(null); URL.revokeObjectURL(url); };
      audio.play();
    }).catch(() => {
      // Fallback to browser TTS
      try {
        window.speechSynthesis?.cancel?.();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "fr-FR";
        const voices = window.speechSynthesis?.getVoices?.() ?? [];
        const fr = voices.filter(v => (v.lang||"").toLowerCase().startsWith("fr"));
        const v = fr.find(v => /female|femme|julie|audrey|amélie|amelie|marie|céline|celine/i.test(v.name)) || fr[0];
        if (v) u.voice = v;
        u.rate = speed || 0.92;
        u.onend = () => setPlayingIdx(null);
        window.speechSynthesis?.speak(u);
      } catch { setPlayingIdx(null); }
    });
  }

  /* ── Init session with tutor opener ── */
  function initSession(s, level, key) {
    setHistory([]);
    setSessionSummary("");
    setError(null);
    stopAudio();
    const opener = s.opener?.[level] || s.opener?.A2 || "Bonjour !";
    setHistory([{ role:"tutor", text:opener, notes:[] }]);
    setTimeout(() => speakOpenAI(opener, key), 300);
  }

  // Fire opener when we have apiKey + scene
  useEffect(() => {
    if (apiKey && scene && !hasInit.current) {
      hasInit.current = true;
      initSession(scene, cefrLevel, apiKey);
    }
  }, [apiKey, scene]);

  // Warm up voices
  useEffect(() => {
    window.speechSynthesis?.getVoices?.();
    const h = () => window.speechSynthesis?.getVoices?.();
    window.speechSynthesis?.addEventListener?.("voiceschanged", h);
    return () => window.speechSynthesis?.removeEventListener?.("voiceschanged", h);
  }, []);

  // Auto-scroll
  useEffect(() => {
    if (scrollRef.current) setTimeout(() => scrollRef.current?.scrollTo({ top:scrollRef.current.scrollHeight, behavior:"smooth" }), 80);
  }, [history, processing]);

  /* ── Key ── */
  const handleApiKey = (key) => { setApiKey(key); try { localStorage.setItem("parle_api_key", key); } catch {} };
  const clearKey = () => { setApiKey(""); hasInit.current = false; setHistory([]); try { localStorage.removeItem("parle_api_key"); } catch {} };

  /* ── Session ── */
  function newSession() {
    const s = SCENES[Math.floor(Math.random() * SCENES.length)];
    setScene(s);
    initSession(s, cefrLevel, apiKey);
  }

  function pickScene(s) {
    setScene(s);
    setShowScenePicker(false);
    initSession(s, cefrLevel, apiKey);
  }

  function cycleLevel() {
    setCefrLevel(prev => CEFR_LEVELS[(CEFR_LEVELS.indexOf(prev) + 1) % CEFR_LEVELS.length]);
  }

  /* ── Replay ── */
  function replayAtIndex(idx, slow) {
    const msg = history[idx];
    if (!msg || msg.role !== "tutor") return;
    setPlayingIdx(idx);
    speakOpenAI(msg.text, apiKey, slow ? 0.7 : 1.0);
  }

  /* ── Transcription ── */
  async function transcribe(blob) {
    const form = new FormData();
    form.append("file", blob, filenameForMime(blob.type || "audio/webm"));
    form.append("model", "whisper-1");
    form.append("language", "fr");
    const resp = await fetch("https://api.openai.com/v1/audio/transcriptions", {
      method: "POST", headers: { "Authorization": "Bearer " + apiKey }, body: form
    });
    if (!resp.ok) {
      const body = await resp.text();
      throw new Error(friendlyApiError(resp.status, body) || "Transcription failed (" + resp.status + ")");
    }
    return ((await resp.json()).text || "").trim();
  }

  /* ── Tutor turn ── */
  async function callTutor(userText, hist) {
    const recent = hist.slice(-8);
    const historyText = recent.map(h => (h.role==="user"?"U":"T") + ": " + h.text).join("\n");
    const userMessage = "Scene: " + (scene?.title||"") + "\nScene hint: " + (scene?.hint||"") + "\n\nRecent conversation:\n" + (historyText||"(none)") + "\n\nSession summary: " + (sessionSummary||"") + "\n\nUser said (French): " + userText + "\n\nReturn JSON only, no markdown fences.";

    const resp = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": "Bearer " + apiKey, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages: [
          { role: "system", content: SYSTEM_PROMPT(cefrLevel) },
          { role: "user", content: userMessage }
        ],
        temperature: 0.8, max_tokens: 500,
        response_format: { type: "json_object" }
      })
    });
    if (!resp.ok) {
      const body = await resp.text();
      throw new Error(friendlyApiError(resp.status, body) || "Tutor error (" + resp.status + ")");
    }
    const raw = (await resp.json()).choices?.[0]?.message?.content || "{}";
    return JSON.parse(raw);
  }

  /* ── Process turn (voice or text) ── */
  async function processTurn(userText) {
    const t = (userText || "").trim();
    if (!t) return;
    stopAudio();
    setError(null);

    const newHist = [...history, { role:"user", text: t }];
    setHistory(newHist);
    setProcessing(true);

    try {
      const result = await callTutor(t, newHist);
      const tutorText = result.tutor_text_fr || "Pardon, je n'ai pas compris. Tu peux répéter ?";
      const notes = Array.isArray(result.notes_en) ? result.notes_en : [];
      setSessionSummary(result.session_summary || sessionSummary);
      const finalHist = [...newHist, { role:"tutor", text:tutorText, notes }];
      setHistory(finalHist);
      setPlayingIdx(finalHist.length - 1);
      speakOpenAI(tutorText, apiKey);
    } catch (e) {
      setError(e.message || "Something went wrong");
    } finally {
      setProcessing(false);
    }
  }

  /* ── Recording ── */
  async function startRecording() {
    setError(null);
    stopAudio();
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      streamRef.current = stream;
      chunksRef.current = [];
      const mime = pickMime();
      const mr = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
      mediaRecorderRef.current = mr;
      mr.ondataavailable = (e) => { if (e.data?.size > 0) chunksRef.current.push(e.data); };
      mr.onstop = async () => {
        setRecording(false);
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(chunksRef.current, { type: mr.mimeType || "audio/webm" });
        chunksRef.current = [];
        if (blob.size < 1000) return;
        setProcessing(true);
        try {
          const text = await transcribe(blob);
          if (!text) { setProcessing(false); return; }
          setProcessing(false);
          await processTurn(text);
        } catch (e) {
          setError(e.message || "Transcription error");
          setProcessing(false);
        }
      };
      setRecording(true);
      mr.start(250);
    } catch { setError("Microphone access denied. Please allow mic permissions."); }
  }

  function stopRecording() { try { mediaRecorderRef.current?.stop(); } catch {} }
  const pressStart = () => { if (pressedRef.current || processing) return; pressedRef.current = true; startRecording(); };
  const pressStop = () => { if (!pressedRef.current) return; pressedRef.current = false; stopRecording(); };

  /* ── Text submit ── */
  async function handleTextSubmit() {
    const t = textInput.trim();
    if (!t || processing) return;
    setTextInput("");
    await processTurn(t);
  }

  /* ── Derived ── */
  const currentSuggestions = scene?.suggestions?.[cefrLevel] || scene?.suggestions?.A2 || [];
  const userTurnCount = history.filter(h => h.role === "user").length;
  const lastMsg = history.length > 0 ? history[history.length - 1] : null;

  /* ══ RENDER ══ */
  if (!apiKey) return <ApiKeyScreen onSubmit={handleApiKey} />;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100dvh", maxWidth:520, margin:"0 auto", background:"var(--bg)", position:"relative" }}>

      {/* Header */}
      <header className="fade-up" style={{ padding:"12px 16px 10px", borderBottom:"1px solid var(--border)", background:"rgba(250,247,242,0.92)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"baseline", gap:8 }}>
            <h1 style={{ fontFamily:"var(--font-display)", fontSize:21, fontWeight:400, letterSpacing:"-0.01em" }}>Parle</h1>
            <button onClick={() => setShowScenePicker(true)} style={{ background:"none", border:"none", cursor:"pointer", fontSize:12.5, color:"var(--fg-muted)", fontFamily:"var(--font-body)", padding:"2px 0", textDecoration:"underline dotted", textUnderlineOffset:3 }}>
              {scene?.emoji} {scene?.title} ▾
            </button>
          </div>
          <div style={{ display:"flex", gap:5 }}>
            <button onClick={cycleLevel} title={CEFR_LABELS[cefrLevel]} style={{ padding:"5px 10px", fontSize:12, fontWeight:600, border:"1px solid var(--border)", borderRadius:8, background:"var(--bg-card)", color:"var(--accent)", cursor:"pointer", fontFamily:"var(--font-body)" }}>{cefrLevel}</button>
            <button onClick={() => userTurnCount >= 2 ? setShowSummary(true) : newSession()} title={userTurnCount >= 2 ? "End session" : "New session"} style={{ padding:"5px 10px", fontSize:12, border:"1px solid var(--border)", borderRadius:8, background:"var(--bg-card)", color:"var(--fg-dim)", cursor:"pointer", fontFamily:"var(--font-body)" }}>
              {userTurnCount >= 2 ? "Fin" : "New"}
            </button>
            <button onClick={clearKey} title="Change API key" style={{ padding:"5px 8px", fontSize:12, border:"1px solid var(--border)", borderRadius:8, background:"var(--bg-card)", color:"var(--fg-muted)", cursor:"pointer" }}>🔑</button>
          </div>
        </div>
      </header>

      {/* Conversation */}
      <div ref={scrollRef} style={{ flex:1, overflowY:"auto", padding:"14px 16px", display:"flex", flexDirection:"column", gap:2, WebkitOverflowScrolling:"touch" }}>

        {/* Scene intro */}
        {history.length <= 1 && scene && (
          <div className="fade-up" style={{ padding:"12px 14px", background:"var(--bg-card-alt)", borderRadius:"var(--radius)", marginBottom:10, border:"1px solid var(--border)" }}>
            <div style={{ fontSize:13, color:"var(--fg-dim)", lineHeight:1.5 }}>
              <strong>{scene.emoji} {scene.title}</strong> — {scene.hint}
            </div>
          </div>
        )}

        {history.map((h, i) => (
          <Bubble key={i} role={h.role} text={h.text} notes={h.notes}
            isLatest={i === history.length - 1} playing={playingIdx === i}
            onReplay={h.role==="tutor" ? () => replayAtIndex(i, false) : null}
            onReplaySlow={h.role==="tutor" ? () => replayAtIndex(i, true) : null}
          />
        ))}

        {processing && (
          <div className="slide-in" style={{ alignSelf:"flex-start", padding:"12px 18px", background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:"18px 18px 18px 4px", boxShadow:"var(--shadow)" }}>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              <span style={{ fontSize:11, color:"var(--fg-muted)", textTransform:"uppercase", letterSpacing:"0.04em" }}>Thinking</span>
              <span style={{ display:"flex", gap:3 }}>
                {[0,1,2].map(i => <span key={i} style={{ width:5, height:5, borderRadius:"50%", background:"var(--fg-muted)", animation:"dotBounce 0.9s ease-in-out " + (i*0.15) + "s infinite" }} />)}
              </span>
            </div>
          </div>
        )}

        {/* Suggestion chips */}
        {!processing && lastMsg?.role === "tutor" && currentSuggestions.length > 0 && (
          <div className="slide-in" style={{ marginTop:6, marginBottom:4 }}>
            <div style={{ fontSize:11, color:"var(--fg-muted)", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.04em" }}>Try saying</div>
            <div style={{ display:"flex", flexWrap:"wrap" }}>
              {currentSuggestions.map((s,i) => (
                <button key={i} className="chip" onClick={() => processTurn(s)}>{s}</button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Error */}
      {error && (
        <div style={{ margin:"0 16px 6px", padding:"10px 14px", background:"var(--error-bg)", border:"1px solid var(--error-border)", borderRadius:"var(--radius-sm)", fontSize:13.5, color:"var(--error-fg)", lineHeight:1.4, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:8 }}>
          <span>{error}</span>
          <button onClick={() => setError(null)} style={{ background:"none", border:"none", cursor:"pointer", color:"var(--error-fg)", fontWeight:600, fontSize:14, flexShrink:0 }}>✕</button>
        </div>
      )}

      {/* Bottom bar */}
      <div style={{ borderTop:"1px solid var(--border)", background:"rgba(250,247,242,0.95)", backdropFilter:"blur(12px)", WebkitBackdropFilter:"blur(12px)", paddingBottom:"max(10px, env(safe-area-inset-bottom))" }}>
        <div className="text-input-row" style={{ paddingTop:10 }}>
          <input ref={textInputRef} type="text" placeholder="Or type in French…" value={textInput}
            onChange={e => setTextInput(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleTextSubmit(); } }}
            disabled={processing} />
          <button disabled={!textInput.trim() || processing} onClick={handleTextSubmit}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <RecordButton recording={recording} processing={processing} onPressStart={pressStart} onPressStop={pressStop} />
        <div style={{ textAlign:"center", fontSize:11.5, color:"var(--fg-muted)", marginTop:1, paddingBottom:2 }}>
          {recording ? "Release to send" : processing ? "Processing…" : "Hold to speak"}
        </div>
      </div>

      {/* Modals */}
      {showScenePicker && <ScenePicker current={scene} onPick={pickScene} onClose={() => setShowScenePicker(false)} />}
      {showSummary && <SessionSummaryModal turnCount={userTurnCount} sessionSummary={sessionSummary} onClose={() => setShowSummary(false)} onNewSession={() => { setShowSummary(false); newSession(); }} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
